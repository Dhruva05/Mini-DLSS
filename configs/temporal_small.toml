[project]
name = "mini-dlss"
run_name = "temporal_vsr_5f_small_2x"
seed = 42
scale = 2
device = "cuda"

[dataset]
train_hr_root = "data/raw/vimeo90k_union/sequence"
train_lr_root = ""
val_hr_root = "data/raw/reds/val_sharp"
val_lr_root = "data/raw/reds/val_sharp_bicubic/X2"
train_manifest = "data/splits/vimeo90k_union_train.txt"
val_manifest = "data/splits/reds_val.txt"
num_frames = 5
generate_lr_on_the_fly = true
crop_size_hr = 128

[train]
max_steps = 50000
batch_size = 4
num_workers = 4
lr = 0.0002
log_interval = 100
val_interval = 2000
checkpoint_interval = 2000
resume = ""
loss = "l1"
perceptual_weight = 0.0

[eval]
max_batches = 0
save_examples = 2
output_dir = "results"

[model]
name = "temporal_small"
base_channels = 48
num_blocks = 6
