[project]
name = "mini-dlss"
run_name = "base_2x"
seed = 42
scale = 2
device = "cuda"

[dataset]
train_hr_root = ""
train_lr_root = ""
val_hr_root = ""
val_lr_root = ""
train_manifest = "data/splits/vimeo90k_train.txt"
val_manifest = "data/splits/reds_val.txt"
num_frames = 5
generate_lr_on_the_fly = true
crop_size_hr = 128

[train]
max_steps = 50000
batch_size = 4
num_workers = 4
lr = 0.0002
log_interval = 100
val_interval = 2000
checkpoint_interval = 2000
resume = ""
loss = "l1"
perceptual_weight = 0.0

[eval]
max_batches = 0
save_examples = 2
output_dir = "results"

[model]
name = "temporal_small"
base_channels = 64
num_blocks = 8
